<!DOCTYPE html>
<html>
<head>
  <title>OTP Registration Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
    }
    .box {
      width: 300px;
      margin: 80px auto;
      padding: 20px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 0 10px #ccc;
    }
    input, button {
      width: 100%;
      margin-top: 10px;
      padding: 8px;
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }
    .hidden {
      display: none;
    }
    .msg {
      margin-top: 10px;
      color: green;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="box" id="registerBox">
  <h3>Register</h3>
  <input id="name" placeholder="Name">
  <input id="mobile" placeholder="Mobile">
  <input id="password" type="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <div class="msg" id="registerMsg"></div>
</div>

<div class="box hidden" id="otpBox">
  <h3>Verify OTP</h3>
  <input id="otp" placeholder="Enter OTP">
  <button onclick="verifyOtp()">Verify OTP</button>
  <div class="msg" id="otpMsg"></div>
</div>

<script>
  let savedMobile = "";

  function register() {
    const name = document.getElementById("name").value;
    const mobile = document.getElementById("mobile").value;
    const password = document.getElementById("password").value;

    fetch("http://localhost:3000/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, mobile, password })
    })
    .then(res => res.json())
    .then(data => {
      document.getElementById("registerMsg").innerText =
        data.message + " | OTP: " + data.otp;

      savedMobile = mobile;

      document.getElementById("registerBox").classList.add("hidden");
      document.getElementById("otpBox").classList.remove("hidden");
    });
  }

  function verifyOtp() {
    const otp = document.getElementById("otp").value;

    fetch("http://localhost:3000/verify-otp", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ mobile: savedMobile, otp })
    })
    .then(res => res.json())
    .then(data => {
      document.getElementById("otpMsg").innerText = data.message;
    });
  }
</script>

</body>
</html>
